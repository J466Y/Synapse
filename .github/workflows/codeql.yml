name: "CI/CD Security & Quality"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '33 0 * * 0'  # Cada domingo a las 00:33 UTC

jobs:

  # ─────────────────────────────────────────
  # 1. ANÁLISIS DE SEGURIDAD - CodeQL
  # ─────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/J466Y/darktrace-sdk.git
        pip install -r requirements.txt

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
        build-mode: none
        queries: security-extended

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python"


  # ─────────────────────────────────────────
  # 2. DEPENDENCIAS - CVEs (non-blocking)
  # ─────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install deps + pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip install git+https://github.com/J466Y/darktrace-sdk.git
        pip install -r requirements.txt

    - name: Audit dependencies (non-blocking)
      run: |
        pip-audit -r requirements.txt \
          --skip-editable \
          --ignore-vuln GHSA-0000-0000-0000 \
          --format markdown >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────────────
  # 3. SECRETOS EXPUESTOS
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Scan for secrets (TruffleHog)
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --only-verified


  # ─────────────────────────────────────────
  # 4. CALIDAD DE CÓDIGO
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit

    - name: Flake8 (estilo y errores)
      run: flake8 . --max-line-length=120 --exclude=venv,.git

    - name: Bandit (reporte completo, non-blocking)
      run: bandit -r . -x ./venv,./tests --format markdown >> $GITHUB_STEP_SUMMARY || true
